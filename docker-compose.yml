services:
  frontend:
    build:
      context: .
      dockerfile: frontend-php/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./sofia-backend
      dockerfile: docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sofia_solutions
      APP_MODE: ${APP_MODE:-secure}
      CORS_ORIGIN: http://localhost:8000
      JWT_ACCESS_SECRET: change_me_access
      JWT_REFRESH_SECRET: change_me_refresh
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      COOKIE_SECURE: false
      PROMETHEUS_PREFIX: sofia_
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 10
      ADMIN_EMAIL: admin@sofia.local
      ADMIN_PASSWORD: S0f1a_Secur3!_2026
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sofia_solutions
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prisma-studio:
    build:
      context: ./sofia-backend
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/sofia_solutions
    command: npx prisma studio --port 5555 --hostname 0.0.0.0
    ports:
      - "5556:5555"
    depends_on:
      - postgres
      - backend

  prometheus:
    image: prom/prometheus
    volumes:
      - ./sofia-backend/docker/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: https://sofia-solutions.serveousercontent.com/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_DOMAIN: sofia-solutions.serveousercontent.com
    volumes:
      - ./sofia-backend/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./sofia-backend/docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  tunnel:
    image: alpine:latest
    restart: always
    depends_on:
      - frontend
    volumes:
      - ./tunnel-key:/root/.ssh/id_ed25519
    command: sh -c "apk add --no-cache openssh-client && chmod 600 /root/.ssh/id_ed25519 && ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i /root/.ssh/id_ed25519 -R sofia-solutions:80:frontend:80 serveo.net"

volumes:
  postgres-data:
