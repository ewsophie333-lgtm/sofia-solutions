version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env.example
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sofia_solutions
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
