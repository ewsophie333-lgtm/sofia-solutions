<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520">
  <rect width="1280" height="520" rx="18" fill="#0b1020"/>
  <rect x="24" y="24" width="1232" height="472" rx="14" fill="#11182d" stroke="#27324d"/>
  <circle cx="56" cy="54" r="8" fill="#ff5f57"/>
  <circle cx="82" cy="54" r="8" fill="#febc2e"/>
  <circle cx="108" cy="54" r="8" fill="#28c840"/>
  <text x="150" y="60" fill="#94a3b8" font-family="Consolas, 'Courier New', monospace" font-size="22">frontend / autenticación segura</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="24">
    <text x="54" y="116" fill="#475569">1</text>
    <text x="90" y="116" fill="#cbd5e1">const</text>
    <text x="162" y="116" fill="#e2e8f0"> csrfResponse </text>
    <text x="340" y="116" fill="#cbd5e1">= await</text>
    <text x="448" y="116" fill="#60a5fa"> fetch</text>
    <text x="530" y="116" fill="#e2e8f0">(</text>
    <text x="546" y="116" fill="#86efac">'/api/v2/auth/csrf'</text>
    <text x="812" y="116" fill="#e2e8f0">, { credentials: </text>
    <text x="1018" y="116" fill="#f9a8d4">'include'</text>
    <text x="1138" y="116" fill="#e2e8f0"> });</text>

    <text x="54" y="162" fill="#475569">2</text>
    <text x="90" y="162" fill="#cbd5e1">const</text>
    <text x="162" y="162" fill="#e2e8f0"> { csrfToken } </text>
    <text x="338" y="162" fill="#cbd5e1">= await</text>
    <text x="446" y="162" fill="#e2e8f0"> csrfResponse.</text>
    <text x="632" y="162" fill="#60a5fa">json</text>
    <text x="684" y="162" fill="#e2e8f0">();</text>

    <text x="54" y="228" fill="#475569">3</text>
    <text x="90" y="228" fill="#cbd5e1">await</text>
    <text x="164" y="228" fill="#60a5fa"> fetch</text>
    <text x="246" y="228" fill="#e2e8f0">(</text>
    <text x="262" y="228" fill="#86efac">'/api/v2/auth/login'</text>
    <text x="550" y="228" fill="#e2e8f0">, {</text>

    <text x="54" y="274" fill="#475569">4</text>
    <text x="126" y="274" fill="#fca5a5">method</text>
    <text x="210" y="274" fill="#e2e8f0">: </text>
    <text x="236" y="274" fill="#86efac">'POST'</text>
    <text x="316" y="274" fill="#e2e8f0">, credentials: </text>
    <text x="472" y="274" fill="#f9a8d4">'include'</text>
    <text x="592" y="274" fill="#e2e8f0">,</text>

    <text x="54" y="320" fill="#475569">5</text>
    <text x="126" y="320" fill="#fca5a5">headers</text>
    <text x="216" y="320" fill="#e2e8f0">: { </text>
    <text x="254" y="320" fill="#86efac">'Content-Type'</text>
    <text x="446" y="320" fill="#e2e8f0">: </text>
    <text x="474" y="320" fill="#86efac">'application/json'</text>
    <text x="726" y="320" fill="#e2e8f0">, </text>
    <text x="752" y="320" fill="#86efac">'x-csrf-token'</text>
    <text x="934" y="320" fill="#e2e8f0">: csrfToken },</text>

    <text x="54" y="366" fill="#475569">6</text>
    <text x="126" y="366" fill="#fca5a5">body</text>
    <text x="188" y="366" fill="#e2e8f0">: JSON.</text>
    <text x="286" y="366" fill="#60a5fa">stringify</text>
    <text x="414" y="366" fill="#e2e8f0">({ email, password })</text>

    <text x="54" y="412" fill="#475569">7</text>
    <text x="90" y="412" fill="#e2e8f0">});</text>
  </g>
</svg>
