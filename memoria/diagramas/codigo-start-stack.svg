<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500">
  <rect width="1280" height="500" rx="18" fill="#0b1020"/>
  <rect x="24" y="24" width="1232" height="452" rx="14" fill="#11182d" stroke="#27324d"/>
  <circle cx="56" cy="54" r="8" fill="#ff5f57"/>
  <circle cx="82" cy="54" r="8" fill="#febc2e"/>
  <circle cx="108" cy="54" r="8" fill="#28c840"/>
  <text x="150" y="60" fill="#94a3b8" font-family="Consolas, 'Courier New', monospace" font-size="22">scripts / start-stack.ps1</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="24">
    <text x="54" y="118" fill="#475569">1</text>
    <text x="90" y="118" fill="#cbd5e1">param</text>
    <text x="154" y="118" fill="#e2e8f0">(</text>
    <text x="54" y="164" fill="#475569">2</text>
    <text x="126" y="164" fill="#f8fafc">[ValidateSet(</text>
    <text x="294" y="164" fill="#86efac">"secure", "vulnerable"</text>
    <text x="594" y="164" fill="#f8fafc">)]</text>
    <text x="54" y="210" fill="#475569">3</text>
    <text x="126" y="210" fill="#f8fafc">[string]$Mode = </text>
    <text x="332" y="210" fill="#86efac">"secure"</text>
    <text x="54" y="256" fill="#475569">4</text>
    <text x="126" y="256" fill="#f8fafc">[switch]$Rebuild</text>
    <text x="54" y="302" fill="#475569">5</text>
    <text x="90" y="302" fill="#e2e8f0">)</text>

    <text x="54" y="368" fill="#475569">6</text>
    <text x="90" y="368" fill="#94a3b8"># Define el modo de demostración del entorno completo.</text>
    <text x="54" y="414" fill="#475569">7</text>
    <text x="90" y="414" fill="#e2e8f0">$env:APP_MODE = $Mode</text>
  </g>
</svg>
