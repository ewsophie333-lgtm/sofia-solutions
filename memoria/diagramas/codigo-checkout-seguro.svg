<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" rx="18" fill="#0b1020"/>
  <rect x="24" y="24" width="1232" height="512" rx="14" fill="#11182d" stroke="#27324d"/>
  <circle cx="56" cy="54" r="8" fill="#ff5f57"/>
  <circle cx="82" cy="54" r="8" fill="#febc2e"/>
  <circle cx="108" cy="54" r="8" fill="#28c840"/>
  <text x="150" y="60" fill="#94a3b8" font-family="Consolas, 'Courier New', monospace" font-size="22">backend / checkout seguro</text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="24">
    <text x="54" y="118" fill="#475569">1</text>
    <text x="90" y="118" fill="#cbd5e1">const</text>
    <text x="162" y="118" fill="#e2e8f0"> service </text>
    <text x="252" y="118" fill="#cbd5e1">= await</text>
    <text x="360" y="118" fill="#e2e8f0"> prisma.service.</text>
    <text x="548" y="118" fill="#60a5fa">findUnique</text>
    <text x="674" y="118" fill="#e2e8f0">({</text>

    <text x="54" y="164" fill="#475569">2</text>
    <text x="126" y="164" fill="#fca5a5">where</text>
    <text x="200" y="164" fill="#e2e8f0">: { id: payload.serviceId }</text>

    <text x="54" y="210" fill="#475569">3</text>
    <text x="90" y="210" fill="#e2e8f0">});</text>

    <text x="54" y="276" fill="#475569">4</text>
    <text x="90" y="276" fill="#cbd5e1">if</text>
    <text x="120" y="276" fill="#e2e8f0"> (!service) {</text>
    <text x="54" y="322" fill="#475569">5</text>
    <text x="126" y="322" fill="#cbd5e1">throw new</text>
    <text x="248" y="322" fill="#f8fafc"> NotFoundError</text>
    <text x="438" y="322" fill="#e2e8f0">(</text>
    <text x="454" y="322" fill="#86efac">'Servicio no encontrado'</text>
    <text x="760" y="322" fill="#e2e8f0">);</text>
    <text x="54" y="368" fill="#475569">6</text>
    <text x="90" y="368" fill="#e2e8f0">}</text>

    <text x="54" y="434" fill="#475569">7</text>
    <text x="90" y="434" fill="#cbd5e1">const</text>
    <text x="162" y="434" fill="#e2e8f0"> manipulated </text>
    <text x="332" y="434" fill="#cbd5e1">=</text>
    <text x="356" y="434" fill="#60a5fa"> Number</text>
    <text x="446" y="434" fill="#e2e8f0">(payload.amount) !== </text>
    <text x="690" y="434" fill="#60a5fa">Number</text>
    <text x="774" y="434" fill="#e2e8f0">(service.price);</text>

    <text x="54" y="480" fill="#475569">8</text>
    <text x="90" y="480" fill="#cbd5e1">const</text>
    <text x="162" y="480" fill="#e2e8f0"> safeAmount = service.price;</text>
